apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-ceph-external
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/camcast3/the-basement.git
    targetRevision: main
    path: kubernetes/infrastructure/rook-ceph-external
    directory:
      recurse: false
      exclude: 'values.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: rook-ceph-external
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: secrets.infisical.com
      kind: InfisicalSecret
      jqPathExpressions:
        - .status
