# ArgoCD Server — Gateway API HTTPRoute
# Exposes the ArgoCD UI via the Cilium Gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: kube-system
  hostnames:
    - argocd.local.negativezone.cc
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
