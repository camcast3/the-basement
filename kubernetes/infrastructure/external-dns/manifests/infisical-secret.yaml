# InfisicalSecret — syncs Pi-hole admin password from Infisical → K8s Secret
#
# Creates: Secret "pihole-password" in namespace "external-dns"
#   Key: password = <value of PIHOLE_PASSWORD from Infisical>
#
# In Infisical, create a secret at:
#   Project: k8s-homelab → Environment: prod → Path: /external-dns
#   Secret name: PIHOLE_PASSWORD → value: <your Pi-hole admin password>
#
# Prerequisites:
#   1. Create Machine Identity with Universal Auth in Infisical
#   2. Create the credentials secret:
#      kubectl create secret generic infisical-universal-auth \
#        -n infisical-operator \
#        --from-literal=clientId=<CLIENT_ID> \
#        --from-literal=clientSecret=<CLIENT_SECRET>

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: pihole-password
  namespace: external-dns
spec:
  hostAPI: https://infisical.local.negativezone.cc/api

  syncConfig:
    resyncInterval: 5m

  authentication:
    universalAuth:
      secretsScope:
        projectSlug: k8s-homelab
        envSlug: prod
        secretsPath: /external-dns
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical-operator

  managedKubeSecretReferences:
    - secretName: pihole-password
      secretNamespace: external-dns
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          password: "{{ .PIHOLE_PASSWORD.Value }}"
