# external-dns — Helm values for k8s-homelab
# Chart: external-dns/external-dns v1.20.0
# Install: helm upgrade --install external-dns external-dns/external-dns -n external-dns --create-namespace -f values.yaml
#
# Syncs Ingress/Gateway DNS records to Pi-hole automatically.
# Pi-hole API at http://192.168.25.19 (local DNS server).
#
# Prerequisites:
#   kubectl create secret generic pihole-password \
#     --namespace external-dns \
#     --from-literal=password=<your-pihole-admin-password>

provider:
  name: pihole

extraArgs:
  - --pihole-server=http://192.168.25.19
  - --pihole-tls-skip-verify

env:
  - name: EXTERNAL_DNS_PIHOLE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: pihole-password
        key: password

sources:
  - gateway-httproute
  - gateway-grpcroute
  - gateway-tlsroute
  - gateway-tcproute
  - gateway-udproute
  - ingress
  - service

domainFilters:
  - local.negativezone.cc

policy: upsert-only

txtOwnerId: k8s-homelab

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi
