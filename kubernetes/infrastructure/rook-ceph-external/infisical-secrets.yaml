# InfisicalSecret — syncs Rook-Ceph credentials from Infisical → K8s Secrets
#
# Creates 6 secrets in namespace "rook-ceph-external" that Rook's CSI drivers need:
#   - rook-ceph-mon          (monitor endpoints, FSID, healthchecker key)
#   - rook-ceph-config       (mon_host, mon_initial_members)
#   - rook-csi-rbd-provisioner
#   - rook-csi-rbd-node
#   - rook-csi-cephfs-provisioner
#   - rook-csi-cephfs-node
#
# In Infisical, create secrets at:
#   Project: k8s-homelab → Environment: prod → Path: /rook-ceph
#
#   CEPH_FSID                   — Ceph cluster FSID (from: ceph fsid)
#   CEPH_MON_HOST               — Mon endpoints (v2+v1 format)
#   CEPH_MON_INITIAL_MEMBERS    — Comma-separated mon names
#   CEPH_HEALTHCHECKER_KEY      — CephX key for client.healthchecker
#   CSI_RBD_PROVISIONER_KEY     — CephX key for csi-rbd-provisioner
#   CSI_RBD_NODE_KEY            — CephX key for csi-rbd-node
#   CSI_CEPHFS_PROVISIONER_KEY  — CephX key for csi-cephfs-provisioner
#   CSI_CEPHFS_NODE_KEY         — CephX key for csi-cephfs-node
#
# To regenerate keys, run on pve01:
#   python3 <(curl -s https://raw.githubusercontent.com/rook/rook/master/deploy/examples/create-external-cluster-resources.py) \
#     --rbd-data-pool-name ceph-block --cephfs-filesystem-name cephfs \
#     --namespace rook-ceph-external --format bash

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: rook-ceph-secrets
  namespace: rook-ceph-external
spec:
  hostAPI: https://infisical.local.negativezone.cc/api

  syncConfig:
    # TEMPORARY: Extended to 1440m until CephX keys in Infisical are corrected.
    # The 4 CSI keys (CSI_RBD_PROVISIONER_KEY, CSI_RBD_NODE_KEY,
    # CSI_CEPHFS_PROVISIONER_KEY, CSI_CEPHFS_NODE_KEY) in Infisical have
    # incorrect values. Fix in Infisical then restore to 5m.
    resyncInterval: 1440m

  authentication:
    universalAuth:
      secretsScope:
        projectSlug: k8s-homelab-g-j-rt
        envSlug: prod
        secretsPath: /rook-ceph
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical-operator

  managedKubeSecretReferences:
    # Monitor secret — used by Rook operator to connect to Ceph
    - secretName: rook-ceph-mon
      secretNamespace: rook-ceph-external
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          admin-secret: "admin-secret"
          ceph-secret: "{{ .CEPH_HEALTHCHECKER_KEY.Value }}"
          ceph-username: "client.healthchecker"
          cluster-name: "rook-ceph-external"
          fsid: "{{ .CEPH_FSID.Value }}"
          mon-secret: "mon-secret"

    # Ceph config — monitor connection info for CSI
    - secretName: rook-ceph-config
      secretNamespace: rook-ceph-external
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          mon_host: "{{ .CEPH_MON_HOST.Value }}"
          mon_initial_members: "{{ .CEPH_MON_INITIAL_MEMBERS.Value }}"

    # RBD provisioner — creates/deletes RBD images
    - secretName: rook-csi-rbd-provisioner
      secretNamespace: rook-ceph-external
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          userID: "csi-rbd-provisioner"
          userKey: "{{ .CSI_RBD_PROVISIONER_KEY.Value }}"

    # RBD node — mounts RBD images on worker nodes
    - secretName: rook-csi-rbd-node
      secretNamespace: rook-ceph-external
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          userID: "csi-rbd-node"
          userKey: "{{ .CSI_RBD_NODE_KEY.Value }}"

    # CephFS provisioner — creates/deletes CephFS subvolumes
    - secretName: rook-csi-cephfs-provisioner
      secretNamespace: rook-ceph-external
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          userID: "csi-cephfs-provisioner"
          userKey: "{{ .CSI_CEPHFS_PROVISIONER_KEY.Value }}"

    # CephFS node — mounts CephFS on worker nodes
    - secretName: rook-csi-cephfs-node
      secretNamespace: rook-ceph-external
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          userID: "csi-cephfs-node"
          userKey: "{{ .CSI_CEPHFS_NODE_KEY.Value }}"
