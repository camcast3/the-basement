# Argo CD Image Updater Helm values
# Chart: argocd-image-updater (https://argoproj.github.io/argo-helm)

config:
  registries:
    - name: GitHub Container Registry
      prefix: ghcr.io
      api_url: https://ghcr.io

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
