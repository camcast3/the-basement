# InfisicalSecret — syncs CNPG superuser password from Infisical → K8s Secret
#
# Creates the "cnpg-superuser" secret in namespace "databases" that the
# shared-pg CNPG Cluster references for superuser access.
#
# In Infisical, create the secret at:
#   Project: k8s-homelab → Environment: prod → Path: /cnpg
#
#   CNPG_SUPERUSER_PASSWORD — strong random password (32+ chars recommended)

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: cnpg-secrets
  namespace: databases
spec:
  hostAPI: https://infisical.local.negativezone.cc/api

  syncConfig:
    resyncInterval: 5m

  authentication:
    universalAuth:
      secretsScope:
        projectSlug: k8s-homelab-g-j-rt
        envSlug: prod
        secretsPath: /cnpg
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical-operator

  managedKubeSecretReferences:
    - secretName: cnpg-superuser
      secretNamespace: databases
      creationPolicy: Owner
      secretType: kubernetes.io/basic-auth
      template:
        includeAllSecrets: false
        data:
          username: "postgres"
          password: "{{ .CNPG_SUPERUSER_PASSWORD.Value }}"
