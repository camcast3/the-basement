# infisical-operator — Helm values for k8s-homelab
# Chart: infisical/secrets-operator v0.10.30
# Install:
#   helm upgrade --install infisical-operator infisical/secrets-operator \
#     -n infisical-operator --create-namespace -f values.yaml
#
# The operator syncs secrets from Infisical (TrueNAS) into K8s Secrets.
# Uses Universal Auth — credentials stored in a K8s secret.
#
# Prerequisites:
#   1. Create a Machine Identity in Infisical with "Universal Auth"
#   2. Grant it access to the "k8s-homelab" project (prod environment)
#   3. Create the credentials secret:
#      kubectl create secret generic infisical-universal-auth \
#        -n infisical-operator \
#        --from-literal=clientId=<CLIENT_ID> \
#        --from-literal=clientSecret=<CLIENT_SECRET>

hostAPI: https://infisical.local.negativezone.cc/api

controllerManager:
  replicas: 1
  serviceAccount:
    create: true
    name: infisical-operator
  manager:
    image:
      repository: infisical/kubernetes-operator
      tag: v0.10.30
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi

installCRDs: true
