# InfisicalSecret — syncs Cloudflare API token from Infisical → K8s Secret
#
# Creates: Secret "cloudflare-api-token" in namespace "cert-manager"
#   Key: api-token = <value of CLOUDFLARE_API_TOKEN from Infisical>
#
# In Infisical, create a secret at:
#   Project: k8s-homelab → Environment: prod → Path: /cert-manager
#   Secret name: CLOUDFLARE_API_TOKEN → value: <your Cloudflare API token>
#
# Prerequisites:
#   1. Create Machine Identity with Universal Auth in Infisical
#   2. Create the credentials secret:
#      kubectl create secret generic infisical-universal-auth \
#        -n infisical-operator \
#        --from-literal=clientId=<CLIENT_ID> \
#        --from-literal=clientSecret=<CLIENT_SECRET>

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  hostAPI: https://infisical.local.negativezone.cc/api

  syncConfig:
    resyncInterval: 5m

  authentication:
    universalAuth:
      secretsScope:
        projectSlug: k8s-homelab-g-j-rt
        envSlug: prod
        secretsPath: /cert-manager
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical-operator

  managedKubeSecretReferences:
    - secretName: cloudflare-api-token
      secretNamespace: cert-manager
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          api-token: "{{ .CLOUDFLARE_API_TOKEN.Value }}"
