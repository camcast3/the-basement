# cert-manager — Helm values for k8s-homelab
# Chart: jetstack/cert-manager v1.20.2
# Install: helm upgrade --install cert-manager jetstack/cert-manager -n cert-manager --create-namespace -f values.yaml

installCRDs: true

replicaCount: 2

config:
  apiVersion: controller.config.cert-manager.io/v1alpha1
  kind: ControllerConfiguration
  enableGatewayAPI: true

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi

webhook:
  replicaCount: 2

cainjector:
  replicaCount: 1

# Prometheus metrics
prometheus:
  enabled: false
  servicemonitor:
    enabled: false
