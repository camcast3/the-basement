# Cilium Gateway API — shared Gateway resource
# All HTTPRoutes across namespaces reference this Gateway.
# MetalLB assigns a LoadBalancer IP from the homelab-pool.
# cert-manager auto-provisions TLS via the annotation + Gateway API integration.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cilium-gateway
  namespace: kube-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      hostname: "*.local.negativezone.cc"
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-local-negativezone-tls
      allowedRoutes:
        namespaces:
          from: All
