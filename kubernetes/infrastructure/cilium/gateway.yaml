# Cilium Gateway API — shared Gateway resource
# All HTTPRoutes across namespaces reference this Gateway.
# MetalLB assigns a LoadBalancer IP from the homelab-pool.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cilium-gateway
  namespace: kube-system
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
