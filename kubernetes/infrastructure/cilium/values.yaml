# Cilium CNI — Helm values for k8s-homelab
# Installed with: helm upgrade --install cilium cilium/cilium -n kube-system -f values.yaml
# Chart version: 1.19.2
# Replaces kube-proxy (kubeProxyReplacement=true)
#
# Talos-specific settings per:
# https://www.talos.dev/v1.12/kubernetes-guides/network/deploying-cilium/

ipam:
  mode: kubernetes

kubeProxyReplacement: true

# KubePrism endpoint (Talos built-in API server LB)
k8sServiceHost: localhost
k8sServicePort: 7445

# Talos provides cgroupv2 and bpffs mounts
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Prometheus metrics for Cilium agent
prometheus:
  enabled: true
  port: 9962
  serviceMonitor:
    enabled: false

# Cilium Envoy proxy metrics
envoy:
  prometheus:
    enabled: true
    port: "9964"
    servicePort: 9964

# Cilium Operator metrics
operator:
  prometheus:
    enabled: true
    port: 9963
    serviceMonitor:
      enabled: false

# Hubble observability
hubble:
  enabled: true
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - icmp
      - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
      - policy:ignoreDirection=egress;sourceContext=app;destinationContext=app
    enableOpenMetrics: true
    serviceMonitor:
      enabled: false
  relay:
    enabled: true
    prometheus:
      enabled: true
      port: 9966
      serviceMonitor:
        enabled: false
  ui:
    enabled: true

# Gateway API support (replaces traditional Ingress + Istio)
gatewayAPI:
  enabled: true
  externalTrafficPolicy: Local

# Cilium-native LoadBalancer IPAM + L2 announcements (replaces MetalLB)
l2announcements:
  enabled: true

externalIPs:
  enabled: true

# Talos doesn't allow loading kernel modules from pods
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
