apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-apps
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  argocd.json: |
    {
      "uid": "argocd",
      "title": "ArgoCD",
      "schemaVersion": 39,
      "editable": true,
      "refresh": "1m",
      "timezone": "browser",
      "tags": ["argocd", "gitops"],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Apps",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Apps",
          "gridPos": { "x": 0, "y": 1, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "count(argocd_app_info)",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "blue", "value": null }]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Synced",
          "gridPos": { "x": 4, "y": 1, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "count(argocd_app_info{sync_status=\"Synced\"})",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Out of Sync",
          "gridPos": { "x": 8, "y": 1, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "count(argocd_app_info{sync_status=\"OutOfSync\"})",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Unknown",
          "gridPos": { "x": 12, "y": 1, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "count(argocd_app_info{sync_status=\"Unknown\"})",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Healthy",
          "gridPos": { "x": 16, "y": 1, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "count(argocd_app_info{health_status=\"Healthy\"})",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 7,
          "type": "stat",
          "title": "Degraded",
          "gridPos": { "x": 20, "y": 1, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "count(argocd_app_info{health_status=\"Degraded\"})",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 8,
          "type": "piechart",
          "title": "Sync Status Breakdown",
          "gridPos": { "x": 0, "y": 5, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "count by(sync_status) (argocd_app_info)",
              "legendFormat": "{{sync_status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "right" },
            "tooltip": { "mode": "single" },
            "pieType": "pie",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "id": 9,
          "type": "piechart",
          "title": "Health Status Breakdown",
          "gridPos": { "x": 12, "y": 5, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "count by(health_status) (argocd_app_info)",
              "legendFormat": "{{health_status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "right" },
            "tooltip": { "mode": "single" },
            "pieType": "pie",
            "reduceOptions": { "calcs": ["lastNotNull"] }
          }
        },
        {
          "id": 10,
          "type": "row",
          "title": "Sync Performance",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 13, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Sync Count Rate",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(argocd_app_sync_total[5m]))",
              "legendFormat": "Syncs/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "axisCenteredZero": false,
                "axisPlacement": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          }
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "Sync by Phase",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by(phase) (rate(argocd_app_sync_total[5m]))",
              "legendFormat": "{{phase}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "axisCenteredZero": false,
                "axisPlacement": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          }
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Reconciliation Rate",
          "gridPos": { "x": 0, "y": 22, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(argocd_app_reconcile_count[5m]))",
              "legendFormat": "Reconciliations/s"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "axisCenteredZero": false,
                "axisPlacement": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          }
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Reconciliation Duration",
          "gridPos": { "x": 12, "y": 22, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.50, sum by(le) (rate(argocd_app_reconcile_bucket[5m])))",
              "legendFormat": "p50"
            },
            {
              "refId": "B",
              "expr": "histogram_quantile(0.95, sum by(le) (rate(argocd_app_reconcile_bucket[5m])))",
              "legendFormat": "p95"
            },
            {
              "refId": "C",
              "expr": "histogram_quantile(0.99, sum by(le) (rate(argocd_app_reconcile_bucket[5m])))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "axisCenteredZero": false,
                "axisPlacement": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          }
        },
        {
          "id": 15,
          "type": "row",
          "title": "Repo Server",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 30, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Git Request Rate",
          "gridPos": { "x": 0, "y": 31, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by(repo) (rate(argocd_git_request_total[5m]))",
              "legendFormat": "{{repo}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "axisCenteredZero": false,
                "axisPlacement": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          }
        },
        {
          "id": 17,
          "type": "timeseries",
          "title": "Git Request Duration",
          "gridPos": { "x": 12, "y": 31, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.50, sum by(le) (rate(argocd_git_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p50"
            },
            {
              "refId": "B",
              "expr": "histogram_quantile(0.95, sum by(le) (rate(argocd_git_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p95"
            },
            {
              "refId": "C",
              "expr": "histogram_quantile(0.99, sum by(le) (rate(argocd_git_request_duration_seconds_bucket[5m])))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "axisCenteredZero": false,
                "axisPlacement": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "single" }
          }
        }
      ],
      "version": 1
    }
  argo-rollouts.json: |
    {
      "uid": "argo-rollouts",
      "title": "Argo Rollouts",
      "schemaVersion": 39,
      "editable": true,
      "refresh": "1m",
      "timezone": "browser",
      "tags": ["argo", "rollouts", "delivery"],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Controller Health",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Controller Up",
          "gridPos": { "x": 0, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "up{job=\"kubernetes-pods\", container=\"argo-rollouts\"}",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": { "text": "Down", "color": "red", "index": 0 },
                    "1": { "text": "Up", "color": "green", "index": 1 }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "red" },
                  { "value": 1, "color": "green" }
                ]
              },
              "noValue": "Down"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Total Rollouts",
          "gridPos": { "x": 6, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count(rollout_info) or vector(0)",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "blue" }
                ]
              },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Healthy Rollouts",
          "gridPos": { "x": 12, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count(rollout_info{phase=\"Healthy\"}) or vector(0)",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Paused / Degraded",
          "gridPos": { "x": 18, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count(rollout_info{phase=~\"Paused|Degraded\"}) or vector(0)",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 1, "color": "yellow" }
                ]
              },
              "noValue": "0"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 6,
          "type": "row",
          "title": "Rollout Status",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 7,
          "type": "table",
          "title": "All Rollouts",
          "gridPos": { "x": 0, "y": 6, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rollout_info",
              "legendFormat": "",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Value": true,
                  "__name__": true,
                  "container": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "pod": true,
                  "service": true
                },
                "indexByName": {
                  "name": 0,
                  "namespace": 1,
                  "strategy": 2,
                  "phase": 3
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "displayMode": "auto"
              },
              "noValue": "No rollouts found"
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              { "displayName": "namespace", "desc": false }
            ]
          }
        },
        {
          "id": 8,
          "type": "piechart",
          "title": "Rollouts by Phase",
          "gridPos": { "x": 0, "y": 14, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count by (phase) (rollout_info)",
              "legendFormat": "{{phase}}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "pieType": "pie",
            "tooltip": { "mode": "single" },
            "legend": { "displayMode": "list", "placement": "right" }
          }
        },
        {
          "id": 9,
          "type": "piechart",
          "title": "Rollouts by Strategy",
          "gridPos": { "x": 12, "y": 14, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count by (strategy) (rollout_info)",
              "legendFormat": "{{strategy}}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "pieType": "pie",
            "tooltip": { "mode": "single" },
            "legend": { "displayMode": "list", "placement": "right" }
          }
        },
        {
          "id": 10,
          "type": "row",
          "title": "Reconciliation",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 22, "w": 24, "h": 1 },
          "panels": []
        },
        {
