# InfisicalSecret — syncs Grafana OAuth credentials from Infisical → K8s Secret
#
# Creates: Secret "grafana-oauth" in namespace "monitoring"
#   Keys: client_id, client_secret
#
# In Infisical, create secrets at:
#   Project: k8s-homelab → Environment: prod → Path: /grafana
#   Secret names: GRAFANA_OAUTH_CLIENT_ID, GRAFANA_OAUTH_CLIENT_SECRET

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: grafana-oauth
  namespace: monitoring
spec:
  hostAPI: https://infisical.local.negativezone.cc/api

  syncConfig:
    resyncInterval: 5m

  authentication:
    universalAuth:
      secretsScope:
        projectSlug: k8s-homelab-g-j-rt
        envSlug: prod
        secretsPath: /grafana
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: infisical-operator

  managedKubeSecretReferences:
    - secretName: grafana-oauth
      secretNamespace: monitoring
      creationPolicy: Owner
      template:
        includeAllSecrets: false
        data:
          client_id: "{{ .GRAFANA_OAUTH_CLIENT_ID.Value }}"
          client_secret: "{{ .GRAFANA_OAUTH_CLIENT_SECRET.Value }}"
