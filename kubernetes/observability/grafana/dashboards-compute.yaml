apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-compute
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  namespace-resources.json: |
    {
        "uid": "namespace-resources",
        "title": "Namespace Resources",
        "description": "Namespace-level compute resource usage dashboard",
        "tags": ["kubernetes", "compute", "resources"],
        "schemaVersion": 39,
        "editable": true,
        "refresh": "30s",
        "timezone": "browser",
        "time": {
            "from": "now-1h",
            "to": "now"
        },
        "fiscalYearStartMonth": 0,
        "graphTooltip": 1,
        "panels": [
            {
                "id": 1,
                "type": "row",
                "title": "Cluster Totals",
                "collapsed": false,
                "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
                "panels": []
            },
            {
                "id": 2,
                "type": "stat",
                "title": "Total Namespaces",
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "gridPos": { "x": 0, "y": 1, "w": 6, "h": 4 },
                "targets": [
                    {
                        "refId": "A",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "count(kube_namespace_status_phase{phase=\"Active\"})",
                        "legendFormat": "__auto",
                        "instant": true
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                { "color": "green", "value": null }
                            ]
                        },
                        "color": { "mode": "thresholds" }
                    },
                    "overrides": []
                },
                "options": {
                    "reduceOptions": {
                        "calcs": ["lastNotNull"],
                        "fields": "",
                        "values": false
                    },
                    "orientation": "auto",
                    "textMode": "auto",
                    "colorMode": "value",
                    "graphMode": "none",
                    "justifyMode": "auto"
                }
            },
            {
                "id": 3,
                "type": "stat",
                "title": "Total Pods Running",
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "gridPos": { "x": 6, "y": 1, "w": 6, "h": 4 },
                "targets": [
                    {
                        "refId": "A",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "count(kube_pod_status_phase{phase=\"Running\"})",
                        "legendFormat": "__auto",
                        "instant": true
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                { "color": "green", "value": null }
                            ]
                        },
                        "color": { "mode": "thresholds" }
                    },
                    "overrides": []
                },
                "options": {
                    "reduceOptions": {
                        "calcs": ["lastNotNull"],
                        "fields": "",
                        "values": false
                    },
                    "orientation": "auto",
                    "textMode": "auto",
                    "colorMode": "value",
                    "graphMode": "none",
                    "justifyMode": "auto"
                }
            },
            {
                "id": 4,
                "type": "stat",
                "title": "Cluster CPU Usage",
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "gridPos": { "x": 12, "y": 1, "w": 6, "h": 4 },
                "targets": [
                    {
                        "refId": "A",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\"}[5m]))",
                        "legendFormat": "__auto",
                        "instant": true
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "unit": "short",
                        "decimals": 2,
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                { "color": "green", "value": null }
                            ]
                        },
                        "color": { "mode": "thresholds" }
                    },
                    "overrides": []
                },
                "options": {
                    "reduceOptions": {
                        "calcs": ["lastNotNull"],
                        "fields": "",
                        "values": false
                    },
                    "orientation": "auto",
                    "textMode": "auto",
                    "colorMode": "value",
                    "graphMode": "none",
                    "justifyMode": "auto"
                }
            },
            {
                "id": 5,
                "type": "stat",
                "title": "Cluster Memory Usage",
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "gridPos": { "x": 18, "y": 1, "w": 6, "h": 4 },
                "targets": [
                    {
                        "refId": "A",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "sum(container_memory_working_set_bytes{container!=\"\"})",
                        "legendFormat": "__auto",
                        "instant": true
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "unit": "bytes",
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                { "color": "green", "value": null }
                            ]
                        },
                        "color": { "mode": "thresholds" }
                    },
                    "overrides": []
                },
                "options": {
                    "reduceOptions": {
                        "calcs": ["lastNotNull"],
                        "fields": "",
                        "values": false
                    },
                    "orientation": "auto",
                    "textMode": "auto",
                    "colorMode": "value",
                    "graphMode": "none",
                    "justifyMode": "auto"
                }
            },
            {
                "id": 6,
                "type": "row",
                "title": "CPU by Namespace",
                "collapsed": false,
                "gridPos": { "x": 0, "y": 5, "w": 24, "h": 1 },
                "panels": []
            },
            {
                "id": 7,
                "type": "timeseries",
                "title": "CPU Usage by Namespace",
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "gridPos": { "x": 0, "y": 6, "w": 24, "h": 10 },
                "targets": [
                    {
                        "refId": "A",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=\"\"}[5m]))",
                        "legendFormat": "{{namespace}}"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "unit": "short",
                        "custom": {
                            "drawStyle": "line",
                            "lineInterpolation": "smooth",
                            "lineWidth": 2,
                            "fillOpacity": 20,
                            "gradientMode": "none",
                            "showPoints": "never",
                            "axisCenteredZero": false,
                            "axisColorMode": "text",
                            "scaleDistribution": { "type": "linear" },
                            "spanNulls": false,
                            "stacking": { "mode": "normal", "group": "A" },
                            "thresholdsStyle": { "mode": "off" }
                        },
                        "color": { "mode": "palette-classic" },
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                { "color": "green", "value": null }
                            ]
                        }
                    },
                    "overrides": []
                },
                "options": {
                    "tooltip": { "mode": "multi", "sort": "desc" },
                    "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
                }
            },
            {
                "id": 8,
                "type": "row",
                "title": "Memory by Namespace",
                "collapsed": false,
                "gridPos": { "x": 0, "y": 16, "w": 24, "h": 1 },
                "panels": []
            },
            {
                "id": 9,
                "type": "timeseries",
                "title": "Memory Usage by Namespace",
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "gridPos": { "x": 0, "y": 17, "w": 24, "h": 10 },
                "targets": [
                    {
                        "refId": "A",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\"})",
                        "legendFormat": "{{namespace}}"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "unit": "bytes",
                        "custom": {
                            "drawStyle": "line",
                            "lineInterpolation": "smooth",
                            "lineWidth": 2,
                            "fillOpacity": 20,
                            "gradientMode": "none",
                            "showPoints": "never",
                            "axisCenteredZero": false,
                            "axisColorMode": "text",
                            "scaleDistribution": { "type": "linear" },
                            "spanNulls": false,
                            "stacking": { "mode": "normal", "group": "A" },
                            "thresholdsStyle": { "mode": "off" }
                        },
                        "color": { "mode": "palette-classic" },
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                { "color": "green", "value": null }
                            ]
                        }
                    },
                    "overrides": []
                },
                "options": {
                    "tooltip": { "mode": "multi", "sort": "desc" },
                    "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
                }
            },
            {
                "id": 10,
                "type": "row",
                "title": "Resource Table",
                "collapsed": false,
                "gridPos": { "x": 0, "y": 27, "w": 24, "h": 1 },
                "panels": []
            },
            {
                "id": 11,
                "type": "table",
                "title": "Resource Usage per Namespace",
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "gridPos": { "x": 0, "y": 28, "w": 24, "h": 12 },
                "targets": [
                    {
                        "refId": "A",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{container!=\"\"}[5m]))",
                        "format": "table",
                        "instant": true
                    },
                    {
                        "refId": "B",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "sum by (namespace) (kube_pod_container_resource_requests{resource=\"cpu\"})",
                        "format": "table",
                        "instant": true
                    },
                    {
                        "refId": "C",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "sum by (namespace) (kube_pod_container_resource_limits{resource=\"cpu\"})",
                        "format": "table",
                        "instant": true
                    },
                    {
                        "refId": "D",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\"})",
                        "format": "table",
                        "instant": true
                    },
                    {
                        "refId": "E",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "sum by (namespace) (kube_pod_container_resource_requests{resource=\"memory\"})",
                        "format": "table",
                        "instant": true
                    },
                    {
                        "refId": "F",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "sum by (namespace) (kube_pod_container_resource_limits{resource=\"memory\"})",
                        "format": "table",
                        "instant": true
                    },
                    {
                        "refId": "G",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "count by (namespace) (kube_pod_info)",
                        "format": "table",
                        "instant": true
                    }
                ],
                "fieldConfig": {
                    "defaults": {},
                    "overrides": [
                        {
                            "matcher": { "id": "byName", "options": "Value #A" },
                            "properties": [
                                { "id": "displayName", "value": "CPU Usage" },
                                { "id": "unit", "value": "short" },
                                { "id": "decimals", "value": 3 }
                            ]
                        },
                        {
                            "matcher": { "id": "byName", "options": "Value #B" },
                            "properties": [
                                { "id": "displayName", "value": "CPU Requests" },
                                { "id": "unit", "value": "short" },
                                { "id": "decimals", "value": 3 }
                            ]
                        },
                        {
                            "matcher": { "id": "byName", "options": "Value #C" },
                            "properties": [
                                { "id": "displayName", "value": "CPU Limits" },
                                { "id": "unit", "value": "short" },
                                { "id": "decimals", "value": 3 }
                            ]
                        },
                        {
                            "matcher": { "id": "byName", "options": "Value #D" },
                            "properties": [
                                { "id": "displayName", "value": "Memory Usage" },
                                { "id": "unit", "value": "bytes" },
                                { "id": "decimals", "value": 2 }
                            ]
                        },
                        {
                            "matcher": { "id": "byName", "options": "Value #E" },
                            "properties": [
                                { "id": "displayName", "value": "Memory Requests" },
                                { "id": "unit", "value": "bytes" },
                                { "id": "decimals", "value": 2 }
                            ]
                        },
                        {
                            "matcher": { "id": "byName", "options": "Value #F" },
                            "properties": [
                                { "id": "displayName", "value": "Memory Limits" },
                                { "id": "unit", "value": "bytes" },
                                { "id": "decimals", "value": 2 }
                            ]
                        },
                        {
                            "matcher": { "id": "byName", "options": "Value #G" },
                            "properties": [
                                { "id": "displayName", "value": "Pod Count" },
                                { "id": "decimals", "value": 0 }
                            ]
                        }
                    ]
                },
                "options": {
                    "showHeader": true,
                    "sortBy": [
                        { "displayName": "Memory Usage", "desc": true }
                    ],
                    "footer": { "show": false }
                },
                "transformations": [
                    {
                        "id": "merge",
                        "options": {}
                    },
                    {
                        "id": "organize",
                        "options": {
                            "excludeByName": {
                                "Time": true
                            },
                            "renameByName": {
                                "namespace": "Namespace"
                            },
                            "indexByName": {
                                "namespace": 0,
                                "Value #A": 1,
                                "Value #B": 2,
                                "Value #C": 3,
                                "Value #D": 4,
                                "Value #E": 5,
                                "Value #F": 6,
                                "Value #G": 7
                            }
                        }
                    }
                ]
            },
            {
                "id": 12,
                "type": "row",
                "title": "Top Pods",
                "collapsed": false,
                "gridPos": { "x": 0, "y": 40, "w": 24, "h": 1 },
                "panels": []
            },
            {
                "id": 13,
                "type": "timeseries",
                "title": "Top 10 Pods by CPU",
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "gridPos": { "x": 0, "y": 41, "w": 12, "h": 8 },
                "targets": [
                    {
                        "refId": "A",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "topk(10, sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{container!=\"\"}[5m])))",
                        "legendFormat": "{{namespace}}/{{pod}}"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "unit": "short",
                        "custom": {
                            "drawStyle": "line",
                            "lineInterpolation": "smooth",
                            "lineWidth": 2,
                            "fillOpacity": 10,
                            "gradientMode": "none",
                            "showPoints": "never",
                            "axisCenteredZero": false,
                            "axisColorMode": "text",
                            "scaleDistribution": { "type": "linear" },
                            "spanNulls": false,
                            "thresholdsStyle": { "mode": "off" }
                        },
                        "color": { "mode": "palette-classic" },
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                { "color": "green", "value": null }
                            ]
                        }
                    },
                    "overrides": []
                },
                "options": {
                    "tooltip": { "mode": "multi", "sort": "desc" },
                    "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
                }
            },
            {
                "id": 14,
                "type": "timeseries",
                "title": "Top 10 Pods by Memory",
                "datasource": { "type": "prometheus", "uid": "prometheus" },
                "gridPos": { "x": 12, "y": 41, "w": 12, "h": 8 },
                "targets": [
                    {
                        "refId": "A",
                        "datasource": { "type": "prometheus", "uid": "prometheus" },
                        "expr": "topk(10, sum by (namespace, pod) (container_memory_working_set_bytes{container!=\"\"}))",
                        "legendFormat": "{{namespace}}/{{pod}}"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "unit": "bytes",
                        "custom": {
                            "drawStyle": "line",
                            "lineInterpolation": "smooth",
                            "lineWidth": 2,
                            "fillOpacity": 10,
                            "gradientMode": "none",
                            "showPoints": "never",
                            "axisCenteredZero": false,
                            "axisColorMode": "text",
                            "scaleDistribution": { "type": "linear" },
                            "spanNulls": false,
                            "thresholdsStyle": { "mode": "off" }
                        },
                        "color": { "mode": "palette-classic" },
                        "thresholds": {
                            "mode": "absolute",
                            "steps": [
                                { "color": "green", "value": null }
                            ]
                        }
                    },
                    "overrides": []
                },
                "options": {
                    "tooltip": { "mode": "multi", "sort": "desc" },
                    "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
                }
            }
        ]
    }
