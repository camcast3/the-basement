apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-logs
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  logs-explorer.json: |
    {
      "uid": "logs-explorer",
      "title": "Logs Explorer",
      "description": "Explore logs from Loki by namespace and pod",
      "schemaVersion": 39,
      "editable": true,
      "refresh": "30s",
      "timezone": "browser",
      "tags": ["logs", "loki"],
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "query": "label_values({job=~\".+\"}, namespace)",
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {},
            "hide": 0
          },
          {
            "name": "pod",
            "type": "query",
            "datasource": {
              "type": "loki",
              "uid": "loki"
            },
            "query": "label_values({namespace=~\"$namespace\"}, pod)",
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Log Volume",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "panels": []
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Log Volume by Namespace",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 1 },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "sum by(namespace) (count_over_time({namespace=~\"$namespace\"} [1m]))",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "bars",
                "stacking": {
                  "mode": "normal"
                },
                "fillOpacity": 80,
                "lineWidth": 1,
                "pointSize": 5,
                "showPoints": "never"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          }
        },
        {
          "id": 3,
          "type": "row",
          "title": "Logs",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "panels": []
        },
        {
          "id": 4,
          "type": "logs",
          "title": "Log Lines",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "gridPos": { "h": 16, "w": 24, "x": 0, "y": 10 },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "loki"
              },
              "expr": "{namespace=~\"$namespace\", pod=~\"$pod\"}",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        }
      ],
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "liveNow": false,
      "version": 1
    }
