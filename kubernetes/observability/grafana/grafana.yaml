# Grafana v12.4.3 — upstream deployment
# Image: grafana/grafana:12.4.3
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus - K8s
        type: prometheus
        uid: prometheus
        url: http://prometheus.monitoring.svc:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: 30s
      - name: Prometheus - Watchtower
        type: prometheus
        uid: prometheus-watchtower
        url: https://prometheus.local.negativezone.cc
        access: proxy
        isDefault: false
        jsonData:
          timeInterval: 30s
          tlsSkipVerify: true
      - name: Loki - K8s
        type: loki
        uid: loki
        url: http://loki-gateway.monitoring.svc:80
        access: proxy
        isDefault: false
        jsonData:
          maxLines: 1000
      - name: Alertmanager - K8s
        type: alertmanager
        uid: alertmanager
        url: http://alertmanager.monitoring.svc:9093
        access: proxy
        jsonData:
          implementation: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  grafana.ini: |
    [server]
    root_url = https://grafana.local.negativezone.cc

    [analytics]
    reporting_enabled = false
    check_for_updates = false

    [security]
    admin_user = admin

    [users]
    allow_sign_up = false
    auto_assign_org = true
    auto_assign_org_role = Viewer

    [auth.generic_oauth]
    enabled = true
    name = Authentik
    scopes = openid profile email
    auth_url = https://authentik.local.negativezone.cc/application/o/authorize/
    token_url = https://authentik.local.negativezone.cc/application/o/token/
    api_url = https://authentik.local.negativezone.cc/application/o/userinfo/
    role_attribute_path = contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'
    signout_redirect_url = https://authentik.local.negativezone.cc/application/o/grafana-oauth2/end-session/

    [dashboards]
    default_home_dashboard_path = /var/lib/grafana/dashboards/cluster-overview.json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
      - name: external
        orgId: 1
        folder: 'Scraparr'
        type: file
        disableDeletion: false
        editable: false
        updateIntervalSeconds: 86400
        options:
          path: /var/lib/grafana/dashboards-external
          foldersFromFilesStructure: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      initContainers:
        # Fetch external dashboards from upstream repos at pinned versions
        - name: fetch-external-dashboards
          image: busybox:1.37
          command:
            - /bin/sh
            - -c
            - |
              # Scraparr dashboard — thecfu/scraparr v3.0.3
              wget -q -O /dashboards/scraparr.json \
                "https://raw.githubusercontent.com/thecfu/scraparr/v3.0.3/dashboards/dashboard1.json" \
                && echo "Scraparr dashboard downloaded" \
                || echo "WARNING: failed to download Scraparr dashboard"
          volumeMounts:
            - name: dashboards-external
              mountPath: /dashboards
      containers:
        - name: grafana
          image: grafana/grafana:12.4.3
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: grafana-oauth
                  key: client_id
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-oauth
                  key: client_secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: dashboards-external
              mountPath: /var/lib/grafana/dashboards-external
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
      volumes:
        - name: config
          configMap:
            name: grafana-config
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards-external
          emptyDir: {}
        - name: dashboards
          projected:
            sources:
              - configMap:
                  name: grafana-dashboards-k8s
              - configMap:
                  name: grafana-dashboards-network
              - configMap:
                  name: grafana-dashboards-storage
              - configMap:
                  name: grafana-dashboards-apps
              - configMap:
                  name: grafana-dashboards-homelab
              - configMap:
                  name: grafana-dashboards-logs
              - configMap:
                  name: grafana-dashboards-compute
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: grafana
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: cilium-gateway
      namespace: kube-system
  hostnames:
    - grafana.local.negativezone.cc
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: grafana
          port: 80
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  storageClassName: ceph-rbd
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
