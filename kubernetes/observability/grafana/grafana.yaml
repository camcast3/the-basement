# Grafana v12.4.3 — upstream deployment
# Image: grafana/grafana:12.4.3
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus - K8s
        type: prometheus
        uid: prometheus
        url: http://prometheus.monitoring.svc:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: 30s
      - name: Prometheus - Watchtower
        type: prometheus
        uid: prometheus-watchtower
        url: https://prometheus.local.negativezone.cc
        access: proxy
        isDefault: false
        jsonData:
          timeInterval: 30s
          tlsSkipVerify: true
      - name: Loki - K8s
        type: loki
        uid: loki
        url: http://loki-gateway.monitoring.svc:80
        access: proxy
        isDefault: false
        jsonData:
          maxLines: 1000
      - name: Alertmanager - K8s
        type: alertmanager
        uid: alertmanager
        url: http://alertmanager.monitoring.svc:9093
        access: proxy
        jsonData:
          implementation: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  grafana.ini: |
    [server]
    root_url = https://grafana.local.negativezone.cc

    [analytics]
    reporting_enabled = false
    check_for_updates = false

    [security]
    admin_user = admin

    [users]
    allow_sign_up = false
    auto_assign_org = true
    auto_assign_org_role = Viewer

    [auth.generic_oauth]
    enabled = true
    name = Authentik
    scopes = openid profile email
    auth_url = https://authentik.local.negativezone.cc/application/o/authorize/
    token_url = https://authentik.local.negativezone.cc/application/o/token/
    api_url = https://authentik.local.negativezone.cc/application/o/userinfo/
    role_attribute_path = contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'
    signout_redirect_url = https://authentik.local.negativezone.cc/application/o/grafana-oauth2/end-session/

    [dashboards]
    default_home_dashboard_path = /var/lib/grafana/dashboards/cluster-overview.json
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
      - name: external
        orgId: 1
        folder: 'External'
        type: file
        disableDeletion: false
        editable: false
        updateIntervalSeconds: 86400
        options:
          path: /var/lib/grafana/dashboards-external
          foldersFromFilesStructure: false
---
# External dashboard registry — add entries to fetch upstream dashboards at
# pinned versions. Each key is the output filename (without .json), and the
# value is the raw download URL. Renovate regex managers track the version
# tags embedded in URLs so PRs are opened automatically on new releases.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-external-dashboards
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  # thecfu/scraparr v3.0.3
  scraparr: "https://raw.githubusercontent.com/thecfu/scraparr/v3.0.3/dashboards/dashboard1.json"
  # frebib/nzbget-exporter — pinned to commit (no releases/tags)
  nzbget: "https://raw.githubusercontent.com/frebib/nzbget-exporter/3f31fa1e8c3728a0952de8b4541f9d20b5342ce6/grafana/nzbget-1728694158729.json"
  # traefik/traefik v3.6.13 — standalone (Docker) dashboard
  traefik: "https://raw.githubusercontent.com/traefik/traefik/v3.6.13/contrib/grafana/traefik.json"
---
# Datasource overrides for external dashboards. Each key must match a
# dashboard name from the registry above. Values are find=replace pairs
# (one per line) applied as string replacements on the downloaded JSON.
# Use this to remap upstream datasource UIDs to local ones.
#
# Local datasource UIDs:
#   prometheus           — Prometheus - K8s (default)
#   prometheus-watchtower — Prometheus - Watchtower
#   loki                 — Loki - K8s
#   alertmanager         — Alertmanager - K8s
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-external-dashboard-overrides
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  # Scraparr uses ${DS_MIMIR} __input for most panels
  scraparr: |
    ${DS_MIMIR}=prometheus-watchtower
  # NZBGet dashboard hardcodes ${DS_PROMETHEUS} from __inputs
  nzbget: |
    ${DS_PROMETHEUS}=prometheus-watchtower
  # Traefik dashboard hardcodes ${DS_PROMETHEUS} from __inputs
  traefik: |
    ${DS_PROMETHEUS}=prometheus-watchtower
---
# jq patches for external dashboards. Each key must match a dashboard name
# from the registry. Values are jq filter expressions applied to the JSON
# after download and datasource overrides. Use this to customize upstream
# dashboards — change titles, add tags, tweak thresholds, add/remove panels.
#
# Examples:
#   .title = "My Custom Title"
#   .tags += ["homelab"]
#   .templating.list[] |= if .name == "datasource" then .current.value = "prometheus" else . end
#   .panels += [{ "type": "stat", "title": "Custom Panel", ... }]
#   .panels |= map(select(.title != "Unwanted Row"))
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-external-dashboard-patches
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  # Scraparr uses ${datasource} template variable — default it to watchtower
  scraparr: |
    .templating.list |= map(if .name == "datasource" then .current.value = "prometheus-watchtower" | .current.text = "Prometheus - Watchtower" else . end)
  traefik: |
    .title = "Traefik - Reverse Proxy" |
    .tags = ["traefik", "homelab", "reverse-proxy"] |
    .uid = "traefik-homelab" |
    .refresh = "30s" |
    .time.from = "now-6h"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      securityContext:
        fsGroup: 472
        runAsUser: 472
        runAsNonRoot: true
      initContainers:
        - name: fetch-external-dashboards
          image: alpine:3.21
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache -q jq
              for entry in /registry/*; do
                name=$(basename "$entry")
                url=$(cat "$entry")
                wget -q -O "/dashboards/${name}.json" "$url" \
                  || { echo "WARN: failed to download ${name}"; continue; }
                # Step 1: datasource overrides (find=replace string pairs)
                if [ -f "/overrides/${name}" ]; then
                  while IFS='=' read -r find replace; do
                    [ -z "$find" ] && continue
                    sed -i "s|${find}|${replace}|g" "/dashboards/${name}.json"
                  done < "/overrides/${name}"
                fi
                # Step 2: jq patch (structural customizations)
                if [ -f "/patches/${name}" ]; then
                  filter=$(cat "/patches/${name}")
                  jq "$filter" "/dashboards/${name}.json" > /tmp/patched.json \
                    && mv /tmp/patched.json "/dashboards/${name}.json" \
                    && echo "OK: ${name} (patched)" \
                    || echo "WARN: jq patch failed for ${name}"
                else
                  echo "OK: ${name}"
                fi
              done
              # Ensure Grafana (uid 472) can read the downloaded dashboards
              chmod -R 644 /dashboards/*.json 2>/dev/null || true
          volumeMounts:
            - name: dashboard-registry
              mountPath: /registry
            - name: dashboard-overrides
              mountPath: /overrides
            - name: dashboard-patches
              mountPath: /patches
            - name: dashboards-external
              mountPath: /dashboards
      containers:
        - name: grafana
          image: grafana/grafana:13.0.1
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: grafana-oauth
                  key: client_id
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-oauth
                  key: client_secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: dashboards-external
              mountPath: /var/lib/grafana/dashboards-external
            - name: data
              mountPath: /var/lib/grafana
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
      volumes:
        - name: config
          configMap:
            name: grafana-config
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards-external
          emptyDir: {}
        - name: dashboard-registry
          configMap:
            name: grafana-external-dashboards
        - name: dashboard-overrides
          configMap:
            name: grafana-external-dashboard-overrides
            optional: true
        - name: dashboard-patches
          configMap:
            name: grafana-external-dashboard-patches
            optional: true
        - name: dashboards
          projected:
            sources:
              - configMap:
                  name: grafana-dashboards-k8s
              - configMap:
                  name: grafana-dashboards-network
              - configMap:
                  name: grafana-dashboards-storage
              - configMap:
                  name: grafana-dashboards-apps
              - configMap:
                  name: grafana-dashboards-homelab
              - configMap:
                  name: grafana-dashboards-logs
              - configMap:
                  name: grafana-dashboards-compute
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    app.kubernetes.io/name: grafana
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cilium-gateway
      namespace: kube-system
  hostnames:
    - grafana.local.negativezone.cc
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: grafana
          port: 80
          weight: 1
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  storageClassName: ceph-rbd
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
