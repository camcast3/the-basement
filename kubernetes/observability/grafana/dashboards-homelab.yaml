apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-homelab
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  plex.json: |
    {
      "uid": "plex-server",
      "title": "Plex Media Server",
      "tags": ["plex", "media"],
      "schemaVersion": 39,
      "editable": true,
      "refresh": "1m",
      "timezone": "browser",
      "time": { "from": "now-6h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "server",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus-watchtower" },
            "query": "label_values(server_info, server)",
            "refresh": 2,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "type": "row", "id": 1, "title": "Server Overview",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 }, "collapsed": false
        },
        {
          "type": "stat", "id": 2, "title": "Server Version",
          "gridPos": { "x": 0, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus-watchtower" },
          "targets": [{ "refId": "A", "expr": "server_info{server=~\"$server\"}", "instant": true, "format": "table" }],
          "fieldConfig": { "defaults": { "mappings": [], "color": { "mode": "fixed", "fixedColor": "text" } }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "/^version$/", "values": false }, "colorMode": "none", "graphMode": "none", "textMode": "value" },
          "transformations": []
        },
        {
          "type": "stat", "id": 3, "title": "Platform",
          "gridPos": { "x": 6, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus-watchtower" },
          "targets": [{ "refId": "A", "expr": "server_info{server=~\"$server\"}", "instant": true, "format": "table" }],
          "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "text" } }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "/^platform$/", "values": false }, "colorMode": "none", "graphMode": "none", "textMode": "value" }
        },
        {
          "type": "gauge", "id": 4, "title": "Host CPU",
          "gridPos": { "x": 12, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus-watchtower" },
          "targets": [{ "refId": "A", "expr": "host_cpu_util{server=~\"$server\"}", "legendFormat": "CPU" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 60 }, { "color": "red", "value": 85 }] } }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true }
        },
        {
          "type": "gauge", "id": 5, "title": "Host Memory",
          "gridPos": { "x": 18, "y": 1, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus-watchtower" },
          "targets": [{ "refId": "A", "expr": "host_mem_util{server=~\"$server\"}", "legendFormat": "Memory" }],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 70 }, { "color": "red", "value": 90 }] } }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "showThresholdLabels": false, "showThresholdMarkers": true }
        },
        {
          "type": "row", "id": 6, "title": "Libraries",
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 1 }, "collapsed": false
        },
        {
          "type": "piechart", "id": 7, "title": "Library Storage",
          "gridPos": { "x": 0, "y": 6, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus-watchtower" },
          "targets": [{ "refId": "A", "expr": "library_storage_total{server=~\"$server\"}", "legendFormat": "{{library}}", "instant": true }],
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "values": false }, "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] }, "tooltip": { "mode": "single" }, "pieType": "donut" }
        },
        {
          "type": "bargauge", "id": 8, "title": "Library Storage by Type",
          "gridPos": { "x": 12, "y": 6, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus-watchtower" },
          "targets": [{ "refId": "A", "expr": "library_storage_total{server=~\"$server\"}", "legendFormat": "{{library}}", "instant": true }],
          "fieldConfig": { "defaults": { "unit": "bytes", "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"], "values": false }, "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true }
        },
        {
          "type": "table", "id": 9, "title": "Library Details",
          "gridPos": { "x": 0, "y": 14, "w": 24, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus-watchtower" },
          "targets": [
            { "refId": "A", "expr": "library_storage_total{server=~\"$server\"}", "instant": true, "format": "table" },
            { "refId": "B", "expr": "library_duration_total{server=~\"$server\"}", "instant": true, "format": "table" }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              { "matcher": { "id": "byName", "options": "Value #A" }, "properties": [{ "id": "displayName", "value": "Storage" }, { "id": "unit", "value": "bytes" }] },
              { "matcher": { "id": "byName", "options": "Value #B" }, "properties": [{ "id": "displayName", "value": "Total Duration" }, { "id": "unit", "value": "ms" }] }
            ]
          },
          "transformations": [
            { "id": "merge", "options": {} },
            { "id": "organize", "options": {
              "excludeByName": { "Time": true, "__name__": true, "instance": true, "job": true, "library_id": true, "server": true, "server_id": true, "server_type": true },
              "renameByName": { "library": "Library", "library_type": "Type", "Value #A": "Storage", "Value #B": "Total Duration" },
              "indexByName": { "library": 0, "library_type": 1, "Value #A": 2, "Value #B": 3 }
            }}
          ],
          "options": { "showHeader": true, "sortBy": [{ "displayName": "Storage", "desc": true }] }
        },
        {
          "type": "row", "id": 10, "title": "Host Resources Over Time",
          "gridPos": { "x": 0, "y": 21, "w": 24, "h": 1 }, "collapsed": false
        },
        {
          "type": "timeseries", "id": 11, "title": "CPU & Memory Utilization",
          "gridPos": { "x": 0, "y": 22, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus-watchtower" },
          "targets": [
            { "refId": "A", "expr": "host_cpu_util{server=~\"$server\"}", "legendFormat": "CPU %" },
            { "refId": "B", "expr": "host_mem_util{server=~\"$server\"}", "legendFormat": "Memory %" }
          ],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100, "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 10, "showPoints": "auto", "spanNulls": false } }, "overrides": [] },
          "options": { "tooltip": { "mode": "multi", "sort": "desc" }, "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "mean", "max"] } }
        },
        {
          "type": "timeseries", "id": 12, "title": "Network Transmit",
          "gridPos": { "x": 12, "y": 22, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus-watchtower" },
          "targets": [
            { "refId": "A", "expr": "rate(transmit_bytes_total{server=~\"$server\"}[5m])", "legendFormat": "Transmit Rate" }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps", "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 15, "showPoints": "auto", "spanNulls": false } }, "overrides": [] },
          "options": { "tooltip": { "mode": "multi", "sort": "desc" }, "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "mean", "max"] } }
        }
      ],
      "version": 1
    }
  homelab-services.json: |
    {
      "uid": "homelab-services",
      "title": "Homelab Services",
      "schemaVersion": 39,
      "editable": true,
      "refresh": "1m",
      "timezone": "browser",
      "tags": ["homelab", "docker", "services"],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Pi-hole",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Queries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 1, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "pihole_queries_all",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Queries Blocked",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 6, "y": 1, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "pihole_queries_blocked",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "orange"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "gauge",
          "title": "Percent Blocked",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 1, "w": 12, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "pihole_queries_blocked / pihole_queries_all",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.2 },
                  { "color": "red", "value": 0.5 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            }
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Queries Over Time",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "rate(pihole_queries_all[5m])",
              "legendFormat": "Total"
            },
            {
              "refId": "B",
              "expr": "rate(pihole_queries_blocked[5m])",
              "legendFormat": "Blocked"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 6,
          "type": "row",
          "title": "NVIDIA GPU",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 13, "w": 24, "h": 1 }
        },
        {
          "id": 7,
          "type": "gauge",
          "title": "GPU Utilization",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 14, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            }
          }
        },
        {
          "id": 8,
          "type": "gauge",
          "title": "GPU Memory Used",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 6, "y": 14, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) * 100",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            }
          }
        },
        {
          "id": 9,
          "type": "stat",
          "title": "GPU Temperature",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 14, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "DCGM_FI_DEV_GPU_TEMP",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 10,
          "type": "stat",
          "title": "GPU Power Draw",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 18, "y": 14, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "DCGM_FI_DEV_POWER_USAGE",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "GPU Utilization Over Time",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 18, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "legendFormat": "GPU {{gpu}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "GPU Memory Over Time",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 18, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "DCGM_FI_DEV_FB_USED",
              "legendFormat": "GPU {{gpu}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 13,
          "type": "row",
          "title": "Drive Health (SMART)",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 26, "w": 24, "h": 1 }
        },
        {
          "id": 14,
          "type": "table",
          "title": "Drive Temperature",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 27, "w": 8, "h": 6 },
          "targets": [
            {
              "refId": "A",
              "expr": "smartctl_device_temperature{temperature_type=\"current\"}",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "displayName", "value": "Temperature °C" },
                  { "id": "unit", "value": "celsius" }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": []
          },
          "transformations": [
            {
              "id": "filterFieldsByName",
              "options": {
                "include": {
                  "names": ["device", "model_name", "Value"]
                }
              }
            }
          ]
        },
        {
          "id": 15,
          "type": "table",
          "title": "Power-On Hours",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 8, "y": 27, "w": 8, "h": 6 },
          "targets": [
            {
              "refId": "A",
              "expr": "smartctl_device_power_on_seconds / 3600",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "displayName", "value": "Hours" },
                  { "id": "unit", "value": "short" },
                  { "id": "decimals", "value": 0 }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": []
          },
          "transformations": [
            {
              "id": "filterFieldsByName",
              "options": {
                "include": {
                  "names": ["device", "model_name", "Value"]
                }
              }
            }
          ]
        },
        {
          "id": 16,
          "type": "stat",
          "title": "Reallocated Sectors",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 16, "y": 27, "w": 8, "h": 6 },
          "targets": [
            {
              "refId": "A",
              "expr": "smartctl_device_attribute{attribute_name=~\"Reallocated.*\"}",
              "legendFormat": "{{device}} {{model_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 17,
          "type": "timeseries",
          "title": "Drive Temperature Over Time",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 33, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "smartctl_device_temperature{temperature_type=\"current\"}",
              "legendFormat": "{{device}} {{model_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 18,
          "type": "row",
          "title": "Media (*arr)",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 41, "w": 24, "h": 1 }
        },
        {
          "id": 19,
          "type": "stat",
          "title": "Sonarr Queue",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 42, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "sonarr_queue_total",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
