apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-homelab
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  plex.json: |
    {
      "uid": "plex-sessions",
      "title": "Plex — Sessions & Libraries",
      "tags": ["plex", "media"],
      "schemaVersion": 39,
      "editable": true,
      "refresh": "30s",
      "timezone": "browser",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "server",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": "label_values(plex_sessions_count, server_url)",
            "refresh": 2,
            "includeAll": true,
            "multi": false,
            "current": {},
            "options": [],
            "sort": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Current Sessions",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Active Sessions",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "targets": [
            {
              "refId": "A",
              "expr": "plex_sessions_count{server_url=~\"$server\"}",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Transcoding",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "targets": [
            {
              "refId": "A",
              "expr": "plex_sessions_transcode_count{server_url=~\"$server\"}",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "yellow", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Direct Stream",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "targets": [
            {
              "refId": "A",
              "expr": "plex_sessions_direct_stream_count{server_url=~\"$server\"}",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Direct Play",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "targets": [
            {
              "refId": "A",
              "expr": "plex_sessions_direct_play_count{server_url=~\"$server\"}",
              "legendFormat": ""
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 6,
          "type": "row",
          "title": "Sessions Over Time",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "panels": []
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Sessions Over Time",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
          "targets": [
            {
              "refId": "A",
              "expr": "plex_sessions_count{server_url=~\"$server\"}",
              "legendFormat": "Total Sessions"
            },
            {
              "refId": "B",
              "expr": "plex_sessions_transcode_count{server_url=~\"$server\"}",
              "legendFormat": "Transcoding"
            },
            {
              "refId": "C",
              "expr": "plex_sessions_direct_stream_count{server_url=~\"$server\"}",
              "legendFormat": "Direct Stream"
            },
            {
              "refId": "D",
              "expr": "plex_sessions_direct_play_count{server_url=~\"$server\"}",
              "legendFormat": "Direct Play"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 8,
          "type": "row",
          "title": "Libraries",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "panels": []
        },
        {
          "id": 9,
          "type": "barchart",
          "title": "Library Sizes",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 15 },
          "targets": [
            {
              "refId": "A",
              "expr": "plex_library_section_size_count{server_url=~\"$server\"}",
              "legendFormat": "{{name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          }
        }
      ],
      "version": 1
    }
  plex-streaming.json: |
    {
      "uid": "plex-streaming",
      "title": "Plex — Streaming Breakdown",
      "tags": ["plex", "media", "streaming"],
      "schemaVersion": 39,
      "editable": true,
      "refresh": "30s",
      "timezone": "browser",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "server",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "prometheus"
            },
            "query": "label_values(plex_sessions_count, server_url)",
            "refresh": 2,
            "includeAll": true,
            "multi": false,
            "current": {},
            "options": [],
            "sort": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Play Method Breakdown",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "panels": []
        },
        {
          "id": 2,
          "type": "piechart",
          "title": "Play Method Breakdown",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "targets": [
            {
              "refId": "A",
              "expr": "plex_sessions_direct_play_count{server_url=~\"$server\"}",
              "legendFormat": "Direct Play"
            },
            {
              "refId": "B",
              "expr": "plex_sessions_transcode_count{server_url=~\"$server\"}",
              "legendFormat": "Transcoding"
            },
            {
              "refId": "C",
              "expr": "plex_sessions_direct_stream_count{server_url=~\"$server\"}",
              "legendFormat": "Direct Stream"
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "legend": {
              "displayMode": "list",
              "placement": "right"
            },
            "tooltip": {
              "mode": "single"
            },
            "pieType": "pie"
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Streaming Methods Over Time",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "targets": [
            {
              "refId": "A",
              "expr": "plex_sessions_direct_play_count{server_url=~\"$server\"}",
              "legendFormat": "Direct Play"
            },
            {
              "refId": "B",
              "expr": "plex_sessions_transcode_count{server_url=~\"$server\"}",
              "legendFormat": "Transcoding"
            },
            {
              "refId": "C",
              "expr": "plex_sessions_direct_stream_count{server_url=~\"$server\"}",
              "legendFormat": "Direct Stream"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        },
        {
          "id": 4,
          "type": "row",
          "title": "Users",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 9 },
          "panels": []
        },
        {
          "id": 5,
          "type": "table",
          "title": "Top Users",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(10, sum by(user) (increase(plex_session_play_seconds_total{server_url=~\"$server\"}[24h])))",
              "legendFormat": "",
              "format": "table",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Time"
                },
                "properties": [
                  {
                    "id": "custom.hidden",
                    "value": true
                  }
                ]
              },
              {
                "matcher": {
                  "id": "byName",
                  "options": "Value"
                },
                "properties": [
                  {
                    "id": "displayName",
                    "value": "Play Time (s)"
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Play Time (s)",
                "desc": true
              }
            ]
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "server_url": true
                },
                "renameByName": {
                  "user": "User",
                  "Value": "Play Time (s)"
                }
              }
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Per-User Play Time",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 10 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by(user) (increase(plex_session_play_seconds_total{server_url=~\"$server\"}[1h]))",
              "legendFormat": "{{user}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          }
        }
      ],
      "version": 1
    }
  homelab-services.json: |
    {
      "uid": "homelab-services",
      "title": "Homelab Services",
      "schemaVersion": 39,
      "editable": true,
      "refresh": "1m",
      "timezone": "browser",
      "tags": ["homelab", "docker", "services"],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Pi-hole",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Queries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 1, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "pihole_queries_all",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Queries Blocked",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 6, "y": 1, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "pihole_queries_blocked",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "orange"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "gauge",
          "title": "Percent Blocked",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 1, "w": 12, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "pihole_queries_blocked / pihole_queries_all",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.2 },
                  { "color": "red", "value": 0.5 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            }
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Queries Over Time",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "rate(pihole_queries_all[5m])",
              "legendFormat": "Total"
            },
            {
              "refId": "B",
              "expr": "rate(pihole_queries_blocked[5m])",
              "legendFormat": "Blocked"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 6,
          "type": "row",
          "title": "NVIDIA GPU",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 13, "w": 24, "h": 1 }
        },
        {
          "id": 7,
          "type": "gauge",
          "title": "GPU Utilization",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 14, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            }
          }
        },
        {
          "id": 8,
          "type": "gauge",
          "title": "GPU Memory Used",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 6, "y": 14, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) * 100",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            }
          }
        },
        {
          "id": 9,
          "type": "stat",
          "title": "GPU Temperature",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 14, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "DCGM_FI_DEV_GPU_TEMP",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 10,
          "type": "stat",
          "title": "GPU Power Draw",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 18, "y": 14, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "DCGM_FI_DEV_POWER_USAGE",
              "legendFormat": "__auto"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "GPU Utilization Over Time",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 18, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "legendFormat": "GPU {{gpu}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto"
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 12,
          "type": "timeseries",
          "title": "GPU Memory Over Time",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 18, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "DCGM_FI_DEV_FB_USED",
              "legendFormat": "GPU {{gpu}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto"
              }
            },
            "overrides": []
