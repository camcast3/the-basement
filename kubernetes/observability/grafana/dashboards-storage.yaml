apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-storage
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  ceph-cluster.json: |
    {
      "uid": "ceph-cluster",
      "title": "Ceph Cluster",
      "schemaVersion": 39,
      "editable": true,
      "refresh": "1m",
      "timezone": "browser",
      "tags": ["ceph", "storage"],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Health",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Cluster Status",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 1, "w": 5, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "ceph_health_status",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "HEALTH_OK", "color": "green" } } },
                { "type": "value", "options": { "1": { "text": "HEALTH_WARN", "color": "yellow" } } },
                { "type": "value", "options": { "2": { "text": "HEALTH_ERR", "color": "red" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 1, "color": "yellow" },
                  { "value": 2, "color": "red" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "OSDs Up",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 5, "y": 1, "w": 5, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(ceph_osd_up)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "OSDs In",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 10, "y": 1, "w": 5, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(ceph_osd_in)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "OSDs Total",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 15, "y": 1, "w": 5, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "count(ceph_osd_up)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "blue" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "MON Count",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 20, "y": 1, "w": 4, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "count(ceph_mon_quorum_status == 1)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "blue" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 7,
          "type": "row",
          "title": "Capacity",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Total Capacity",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 6, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "ceph_cluster_total_bytes",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 9,
          "type": "stat",
          "title": "Used Capacity",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 6, "y": 6, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "ceph_cluster_total_used_bytes",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 10,
          "type": "stat",
          "title": "Available",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 6, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "ceph_cluster_total_bytes - ceph_cluster_total_used_bytes",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "id": 11,
          "type": "gauge",
          "title": "Usage %",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 18, "y": 6, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "expr": "ceph_cluster_total_used_bytes / ceph_cluster_total_bytes",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 0.7, "color": "yellow" },
                  { "value": 0.85, "color": "red" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          }
        },
        {
          "id": 12,
          "type": "row",
          "title": "IOPS",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 10, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Read/Write IOPS",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 11, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(ceph_osd_op_r[5m]))",
              "legendFormat": "Read IOPS"
            },
            {
              "refId": "B",
              "expr": "sum(rate(ceph_osd_op_w[5m]))",
              "legendFormat": "Write IOPS"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Read/Write Throughput",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 11, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(ceph_osd_op_r_out_bytes[5m]))",
              "legendFormat": "Read"
            },
            {
              "refId": "B",
              "expr": "sum(rate(ceph_osd_op_w_in_bytes[5m]))",
              "legendFormat": "Write"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 15,
          "type": "row",
          "title": "Pool Stats",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 19, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 16,
          "type": "bargauge",
          "title": "Pool Used Bytes",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 20, "w": 8, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "ceph_pool_stored",
              "legendFormat": "{{name}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 80, "color": "yellow" },
                  { "value": 90, "color": "red" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          }
        },
        {
          "id": 17,
          "type": "bargauge",
          "title": "Pool Objects",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 8, "y": 20, "w": 8, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "ceph_pool_objects",
              "legendFormat": "{{name}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 80, "color": "yellow" },
                  { "value": 90, "color": "red" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          }
        },
        {
          "id": 18,
          "type": "timeseries",
          "title": "Pool Read/Write Ops",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 16, "y": 20, "w": 8, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by(name) (rate(ceph_pool_rd[5m]))",
              "legendFormat": "{{name}} read"
            },
            {
              "refId": "B",
              "expr": "sum by(name) (rate(ceph_pool_wr[5m]))",
              "legendFormat": "{{name}} write"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 19,
          "type": "row",
          "title": "OSD Performance",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 28, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 20,
          "type": "timeseries",
          "title": "OSD Apply Latency",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 29, "w": 8, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "ceph_osd_apply_latency_ms",
              "legendFormat": "osd.{{ceph_daemon}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 21,
          "type": "timeseries",
          "title": "OSD Commit Latency",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 8, "y": 29, "w": 8, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "ceph_osd_commit_latency_ms",
              "legendFormat": "osd.{{ceph_daemon}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "fillOpacity": 10,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 22,
          "type": "bargauge",
          "title": "OSD Utilization",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 16, "y": 29, "w": 8, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "ceph_osd_utilization",
              "legendFormat": "osd.{{ceph_daemon}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "value": null, "color": "green" },
                  { "value": 0.7, "color": "yellow" },
                  { "value": 0.85, "color": "red" }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }
          }
        }
      ],
      "version": 1
    }
  pvc-usage.json: |
    {
      "uid": "pvc-usage",
      "title": "PVC Usage",
      "schemaVersion": 39,
      "editable": true,
      "refresh": "1m",
      "timezone": "browser",
      "tags": ["storage", "pvc", "volumes"],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "panels": [
        {
          "type": "row",
          "id": 1,
          "title": "Overview",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false
        },
        {
          "type": "stat",
          "id": 2,
          "title": "Total PVCs",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "count(kube_persistentvolumeclaim_info)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "type": "stat",
          "id": 3,
          "title": "Bound PVCs",
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "count(kube_persistentvolumeclaim_status_phase{phase=\"Bound\"} == 1)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "type": "stat",
          "id": 4,
          "title": "Pending PVCs",
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "count(kube_persistentvolumeclaim_status_phase{phase=\"Pending\"} == 1)",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "textMode": "auto"
          }
        },
        {
          "type": "row",
          "id": 5,
          "title": "PVC Details Table",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "collapsed": false
        },
        {
          "type": "table",
          "id": 6,
          "title": "PVC Details",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "refId": "A",
              "expr": "kubelet_volume_stats_capacity_bytes * on(namespace, persistentvolumeclaim) group_left(storageclass, volumemode) max by(namespace, persistentvolumeclaim, storageclass, volumemode) (kube_persistentvolumeclaim_info)",
              "instant": true,
              "format": "table"
            },
            {
              "refId": "B",
              "expr": "kubelet_volume_stats_used_bytes * on(namespace, persistentvolumeclaim) group_left(storageclass, volumemode) max by(namespace, persistentvolumeclaim, storageclass, volumemode) (kube_persistentvolumeclaim_info)",
              "instant": true,
              "format": "table"
            },
            {
              "refId": "C",
              "expr": "kubelet_volume_stats_available_bytes * on(namespace, persistentvolumeclaim) group_left(storageclass, volumemode) max by(namespace, persistentvolumeclaim, storageclass, volumemode) (kube_persistentvolumeclaim_info)",
              "instant": true,
              "format": "table"
            },
            {
              "refId": "D",
              "expr": "(kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * on(namespace, persistentvolumeclaim) group_left(storageclass, volumemode) max by(namespace, persistentvolumeclaim, storageclass, volumemode) (kube_persistentvolumeclaim_info)",
              "instant": true,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value #A" },
                "properties": [
                  { "id": "displayName", "value": "Capacity" },
                  { "id": "unit", "value": "bytes" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #B" },
                "properties": [
                  { "id": "displayName", "value": "Used" },
                  { "id": "unit", "value": "bytes" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #C" },
                "properties": [
                  { "id": "displayName", "value": "Available" },
                  { "id": "unit", "value": "bytes" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Value #D" },
                "properties": [
                  { "id": "displayName", "value": "Usage %" },
                  { "id": "unit", "value": "percentunit" },
