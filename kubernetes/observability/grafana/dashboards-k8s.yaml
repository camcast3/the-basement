apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-k8s
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
data:
  cluster-overview.json: |
    {
      "uid": "cluster-overview",
      "title": "Cluster Overview",
      "description": "Homelab Kubernetes cluster overview dashboard",
      "tags": ["kubernetes", "cluster", "overview"],
      "schemaVersion": 39,
      "editable": true,
      "refresh": "30s",
      "timezone": "browser",
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Cluster Health",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Nodes Up",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 1, "w": 4, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "count(up{job=\"node-exporter\"} == 1)",
              "legendFormat": "__auto",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Total Pods Running",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 4, "y": 1, "w": 4, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "__auto",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Pod Restarts (1h)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 8, "y": 1, "w": 4, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(kube_pod_container_status_restarts_total[1h]))",
              "legendFormat": "__auto",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 5,
          "type": "gauge",
          "title": "CPU Cluster Utilization",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 1, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))",
              "legendFormat": "__auto",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "orientation": "auto"
          }
        },
        {
          "id": 6,
          "type": "gauge",
          "title": "Memory Cluster Utilization",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 18, "y": 1, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)",
              "legendFormat": "__auto",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true,
            "orientation": "auto"
          }
        },
        {
          "id": 7,
          "type": "row",
          "title": "Node Resources",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "CPU Usage by Node",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 6, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "1 - avg by(instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 10,
                "gradientMode": "none",
                "showPoints": "never",
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "scaleDistribution": { "type": "linear" },
                "spanNulls": false,
                "thresholdsStyle": { "mode": "off" }
              },
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.9 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom", "calcs": [] }
          }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Memory Usage by Node",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 6, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 10,
                "gradientMode": "none",
                "showPoints": "never",
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "scaleDistribution": { "type": "linear" },
                "spanNulls": false,
                "thresholdsStyle": { "mode": "off" }
              },
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.9 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom", "calcs": [] }
          }
        },
        {
          "id": 10,
          "type": "row",
          "title": "Pods",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 14, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 11,
          "type": "bargauge",
          "title": "Pod Count by Namespace",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 15, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by(namespace) (kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "{{namespace}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true,
            "minVizWidth": 0,
            "minVizHeight": 10
          },
          "transformations": [
            {
              "id": "sortBy",
              "options": {
                "fields": {},
                "sort": [
                  { "field": "Value", "desc": true }
                ]
              }
            }
          ]
        },
        {
          "id": 12,
          "type": "stat",
          "title": "Container Restarts by Namespace",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 15, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by(namespace) (increase(kube_pod_container_status_restarts_total[1h]))",
              "legendFormat": "{{namespace}}",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              },
              "color": { "mode": "thresholds" }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto"
          }
        },
        {
          "id": 13,
          "type": "row",
          "title": "Network",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 23, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Network Receive Rate",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by(instance) (rate(node_network_receive_bytes_total{device!~\"lo|cni.*|veth.*|lxc.*\"}[5m]))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 10,
                "gradientMode": "none",
                "showPoints": "never",
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "scaleDistribution": { "type": "linear" },
                "spanNulls": false,
                "thresholdsStyle": { "mode": "off" }
              },
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom", "calcs": [] }
          }
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Network Transmit Rate",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 24, "w": 12, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum by(instance) (rate(node_network_transmit_bytes_total{device!~\"lo|cni.*|veth.*|lxc.*\"}[5m]))",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 10,
                "gradientMode": "none",
                "showPoints": "never",
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "scaleDistribution": { "type": "linear" },
                "spanNulls": false,
                "thresholdsStyle": { "mode": "off" }
              },
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "list", "placement": "bottom", "calcs": [] }
          }
        },
        {
          "id": 16,
          "type": "row",
          "title": "Storage",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 32, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 17,
          "type": "timeseries",
          "title": "Filesystem Usage %",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 33, "w": 24, "h": 8 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "1 - (node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs\",mountpoint!~\"/boot.*\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|overlay|squashfs\",mountpoint!~\"/boot.*\"})",
              "legendFormat": "{{instance}} {{mountpoint}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 10,
                "gradientMode": "none",
                "showPoints": "never",
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "scaleDistribution": { "type": "linear" },
                "spanNulls": false,
                "thresholdsStyle": { "mode": "off" }
              },
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["lastNotNull", "max"] }
          }
        }
      ],
      "templating": { "list": [] },
      "annotations": { "list": [] },
      "links": [],
      "version": 1
    }
  kubernetes-workloads.json: |
    {
      "uid": "k8s-workloads",
      "title": "Kubernetes Workloads",
      "schemaVersion": 39,
      "editable": true,
      "refresh": "30s",
      "timezone": "browser",
      "tags": ["kubernetes", "workloads"],
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(kube_pod_info, namespace)",
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {},
            "hide": 0
          },
          {
            "name": "workload",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(kube_deployment_labels{namespace=~\"$namespace\"}, deployment)",
            "refresh": 2,
            "sort": 1,
            "includeAll": true,
            "allValue": ".*",
            "multi": true,
            "current": {},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Deployment Status",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Desired Replicas",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 0, "y": 1, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(kube_deployment_spec_replicas{namespace=~\"$namespace\", deployment=~\"$workload\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "blue" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "blue", "value": null }]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Available Replicas",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 6, "y": 1, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(kube_deployment_status_replicas_available{namespace=~\"$namespace\", deployment=~\"$workload\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "fixed", "fixedColor": "green" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Unavailable Replicas",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 12, "y": 1, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(kube_deployment_status_replicas_unavailable{namespace=~\"$namespace\", deployment=~\"$workload\"})",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "id": 5,
          "type": "table",
          "title": "Deployment Status",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "x": 18, "y": 1, "w": 6, "h": 4 },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "kube_deployment_status_replicas{namespace=~\"$namespace\", deployment=~\"$workload\"}",
              "format": "table",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "options": {},
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "instance": true,
                  "job": true
                },
                "renameByName": {
                  "Value": "Replicas",
                  "namespace": "namespace",
                  "deployment": "deployment"
                },
                "indexByName": {
                  "namespace": 0,
                  "deployment": 1,
                  "Value": 2
                }
              }
            }
          ]
        },
        {
          "id": 6,
          "type": "row",
