# Alertmanager v0.32.0 — upstream deployment
# Image: quay.io/prometheus/alertmanager:v0.32.0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: ntfy-warning
      group_by: [alertname, namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: ntfy-critical
          matchers:
            - severity = critical
          group_wait: 10s
          repeat_interval: 1h
          continue: false
        - receiver: ntfy-warning
          matchers:
            - severity = warning
          continue: false
        - receiver: ntfy-info
          matchers:
            - severity = info
          repeat_interval: 12h
          continue: false

    receivers:
      - name: ntfy-critical
        webhook_configs:
          - url: https://ntfy.local.negativezone.cc/critical
            send_resolved: true
            http_config:
              tls_config:
                insecure_skip_verify: true
      - name: ntfy-warning
        webhook_configs:
          - url: https://ntfy.local.negativezone.cc/warning
            send_resolved: true
            http_config:
              tls_config:
                insecure_skip_verify: true
      - name: ntfy-info
        webhook_configs:
          - url: https://ntfy.local.negativezone.cc/info
            send_resolved: true
            http_config:
              tls_config:
                insecure_skip_verify: true
      - name: "null"

    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: [alertname, namespace]
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = info
        equal: [alertname, namespace]
      - source_matchers:
          - severity = warning
        target_matchers:
          - severity = info
        equal: [alertname, namespace]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
spec:
  serviceName: alertmanager
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
    spec:
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: alertmanager
          image: quay.io/prometheus/alertmanager:v0.32.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --web.listen-address=:9093
            - --cluster.listen-address=
          ports:
            - name: http
              containerPort: 9093
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9093
      targetPort: http
  selector:
    app.kubernetes.io/name: alertmanager
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: cilium-gateway
      namespace: kube-system
  hostnames:
    - alertmanager.local.negativezone.cc
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: alertmanager
          port: 9093
          weight: 1
