# Generic CP class (auto-distributes across nodes)
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
  id: cp
spec:
  autoprovision:
    providerid: omni-proxmox
    providerdata: '{"cores": 4, "sockets": 1, "memory": 8192, "disk_size": 50, "storage_selector": "name == \"local-lvm\""}'
---
# Per-node classes for explicit placement
metadata:
  namespace: default
  type: MachineClasses.omni.sidero.dev
