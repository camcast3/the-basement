# Omni On-Prem — Docker Compose Stack
#
# Deploy on a dedicated Docker host (Proxmox VM). DNS for OMNI_DOMAIN must
# point directly to this host. Omni handles its own TLS using Let's Encrypt
# certs obtained via certbot with Cloudflare DNS-01 challenge.
#
# Required files on the host (see .env.example for paths):
#   - omni.asc                  GPG key for etcd encryption
#   - certs/fullchain.pem       Let's Encrypt TLS certificate (fullchain)
#   - certs/privkey.pem         Let's Encrypt TLS private key
#   - cloudflare/credentials.ini  Cloudflare API token for cert renewal
#
# Cert setup:  sudo /opt/omni/setup-certs.sh
# Cert renewal: certbot renew (auto-renewed via systemd timer)
#
# Proxmox provider uses a patched local image (built from source with
# updated gopenpgp to match Omni v1.6+ and fixed NoCloud network-config).
# Build: git clone https://github.com/siderolabs/omni-infra-provider-proxmox
#        # Fix provision.go: change "version: 1" to "" in CloudInit() call
#        go get github.com/ProtonMail/gopenpgp/v2@latest && go get github.com/siderolabs/omni/client@latest
#        go mod tidy && CGO_ENABLED=0 go build -o provider ./cmd/omni-infra-provider-proxmox/
# Proxmox provider is optional — comment out or remove if not needed.

services:
  omni:
    image: ghcr.io/siderolabs/omni:${OMNI_VERSION:-latest}
    container_name: omni
    dns:
      - 192.168.25.19
      - 192.168.86.1
    restart: unless-stopped
    ports:
      - "443:${OMNI_HTTP_PORT:-8080}"                               # Web UI (HTTPS, direct)
      - "${OMNI_HTTP_PORT:-8080}:${OMNI_HTTP_PORT:-8080}"           # Web UI (legacy port)
      - "8090:8090"                                                  # SideroLink API (TLS)
      - "8091:8091"                                                  # Event sink
      - "8100:8100"                                                  # Kubernetes proxy (TLS)
      - "50180:50180/udp"                                            # WireGuard
    networks:
      - omni-network
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    volumes:
      - ${OMNI_DATA_DIR:-/opt/omni}/etcd:/_out/etcd
      - ${OMNI_DATA_DIR:-/opt/omni}/omni.asc:/omni.asc:ro
      - ${OMNI_DATA_DIR:-/opt/omni}:/data
      - ${OMNI_DATA_DIR:-/opt/omni}/certs/fullchain.pem:/tls.crt:ro
      - ${OMNI_DATA_DIR:-/opt/omni}/certs/privkey.pem:/tls.key:ro
    command: >
      --account-id=${OMNI_ACCOUNT_UUID}
      --name=omni
      --cert=/tls.crt
      --key=/tls.key
      --machine-api-cert=/tls.crt
      --machine-api-key=/tls.key
      --private-key-source=file:///omni.asc
      --event-sink-port=8091
      --bind-addr=:${OMNI_HTTP_PORT:-8080}
      --machine-api-bind-addr=:8090
      --k8s-proxy-bind-addr=:8100
      --advertised-api-url=https://${OMNI_DOMAIN}
      --advertised-kubernetes-proxy-url=https://${OMNI_DOMAIN}:8100
      --siderolink-api-advertised-url=https://${OMNI_DOMAIN}:8090
      --siderolink-wireguard-advertised-addr=${OMNI_WIREGUARD_IP}:50180
      --initial-users=${OMNI_ADMIN_EMAIL}
      --auth-auth0-enabled=false
      --auth-saml-enabled=true
      --auth-saml-url=${SAML_METADATA_URL}
      --sqlite-storage-path=/data/omni.db
      --etcd-embedded=true
      --etcd-embedded-unsafe-fsync=false
      --create-initial-service-account
      --initial-service-account-key-path=/data/initial-sa-key
      --initial-service-account-role=Admin

  omni-proxmox-provider:
    image: omni-infra-provider-proxmox:patched
    container_name: omni-proxmox-provider
    restart: unless-stopped
    depends_on:
      - omni
    networks:
      - omni-network
    environment:
      - OMNI_ENDPOINT=https://omni:8080
      - OMNI_SERVICE_ACCOUNT_KEY=${OMNI_SERVICE_ACCOUNT_KEY}
    volumes:
      - ${OMNI_DATA_DIR:-/opt/omni}/proxmox-config.yaml:/config.yaml:ro
    command: >
      --config-file /config.yaml
      --insecure-skip-verify
      --id omni-proxmox

networks:
  omni-network:
    driver: bridge
